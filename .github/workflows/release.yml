name: Release (prebuilt bundle)

# 打 tag（vX.Y.Z）或手动触发时：构建好前端 client/dist，打包成「已含前端的发行包」
# 并作为 GitHub Release 资产上传。普通用户下载它即可零构建安装（连 Node 都不用装）。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '发布标签，例如 v1.0.0'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python for Windows wheels
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Windows backend wheelhouse
        run: |
          python -m pip install --upgrade pip wheel
          mkdir -p server/vendor/wheels
          REQ_WIN="$(mktemp)"
          python - <<'PY' > "$REQ_WIN"
          from pathlib import Path
          for line in Path('server/requirements.txt').read_text(encoding='utf-8').splitlines():
              # Cross-downloading uvicorn[standard] from Linux tries to resolve uvloop,
              # even though uvloop is not used on Windows. Download uvicorn itself and
              # append the Windows-compatible standard extras explicitly.
              if line.startswith('uvicorn[standard]'):
                  print(line.replace('uvicorn[standard]', 'uvicorn', 1))
              else:
                  print(line)
          print('# Windows-compatible uvicorn[standard] extras; uvloop is not used on Windows.')
          print('colorama>=0.4')
          print('httptools>=0.6')
          print('PyYAML>=5.1')
          print('watchfiles>=0.13')
          print('websockets>=10.4')
          PY
          # A couple of transitive dependencies are source-only on PyPI but pure
          # Python; build universal wheels for them so offline install stays wheel-only.
          python -m pip wheel --wheel-dir server/vendor/wheels docopt==0.6.2 sgmllib3k==1.0.0
          # Pre-download Windows x64 wheels so the Windows installer can install
          # backend deps offline / semi-offline. If users install from source or a
          # wheel is missing, scripts/install.ps1 falls back to normal online pip.
          python -m pip download \
            --dest server/vendor/wheels \
            --find-links server/vendor/wheels \
            --only-binary=:all: \
            --platform win_amd64 \
            --implementation cp \
            --python-version 312 \
            --abi cp312 \
            -r "$REQ_WIN"
          # requirements has a Python <3.10 compatibility marker; the bundled
          # wheelhouse targets the installer default Python 3.12, so that marker
          # is harmless if present in the cache.
          test -n "$(find server/vendor/wheels -maxdepth 1 -type f -name '*.whl' -print -quit)"
          du -sh server/vendor/wheels

      - name: Build frontend
        working-directory: client
        env:
          NODE_ENV: development   # 装 devDependencies（不用会触发部分 npm 版本崩溃的 --include=dev flag）
        run: |
          echo "node $(node -v), npm $(npm -v)"
          npm ci --no-audit --no-fund
          # 防御：node_modules 残缺则直接失败，避免后续 tsc 爆一堆 "Cannot find module 'react'"
          test -d node_modules/react && test -x node_modules/.bin/vite && test -x node_modules/.bin/tsc
          npm run build
          test -f dist/index.html

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package prebuilt bundle
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          printf '%s\n' "$TAG" > VERSION
          STAGE="staging/IvyeaOps"
          mkdir -p "$STAGE"
          # 复制整棵仓库（含刚构建出的 client/dist），排除开发/运行期产物。
          rsync -a \
            --exclude='.git' \
            --exclude='staging' \
            --exclude='client/node_modules' \
            --exclude='server/.venv' \
            --exclude='data' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='server/.env' \
            ./ "$STAGE/"
          test -f "$STAGE/client/dist/index.html"   # 确保预构建前端进了包
          ( cd staging && zip -rq "../IvyeaOps-${TAG}.zip" IvyeaOps )
          cp "IvyeaOps-${TAG}.zip" "IvyeaOps.zip"   # 版本无关的稳定名，供 releases/latest/download 一键下载
          ls -lh "IvyeaOps-${TAG}.zip" "IvyeaOps.zip"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            IvyeaOps-${{ steps.tag.outputs.tag }}.zip
            IvyeaOps.zip
          body: |
            **预构建发行包** —— 已包含编译好的前端 `client/dist` 和 Windows Python 3.12 后端依赖包 `server/vendor/wheels`。
            Windows 安装脚本会优先从预置 wheelhouse 离线安装后端依赖；如果用户是源码包、Python 版本不匹配或离线包缺失，
            会自动回退在线 pip 安装。安装脚本检测到已自带前端，会**跳过 Node 安装与前端构建**（含小内存机的 swap 步骤）。

            ### Windows 用户（无需安装 Node）
            下载下方 `IvyeaOps.zip` → 解压 → 双击「安装 IvyeaOps.bat」。

            ### Linux / macOS（尤其小内存服务器，免构建免 swap）
            ```bash
            curl -L https://github.com/Hector-xue/IvyeaOps/releases/latest/download/IvyeaOps.zip -o IvyeaOps.zip
            unzip IvyeaOps.zip && cd IvyeaOps && bash scripts/install.sh
            ```

            ### Windows x64 免 Python 版
            如果不想安装 Python，可下载 `IvyeaOps-Windows-x64.zip` → 解压 → 双击 `IvyeaOpsServer.exe`。更新时双击「更新 IvyeaOps Windows x64.bat」，停止时双击「停止 IvyeaOps.bat」。

            ### 开发者
            也可 `git clone` 源码自行构建（需 Node 18+ 与 ≥2G 内存）。

  build-windows-x64:
    name: Build Windows x64 exe bundle
    runs-on: windows-latest
    needs: build-and-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build frontend
        working-directory: client
        env:
          NODE_ENV: development
        run: |
          npm ci --no-audit --no-fund
          npm run build
          if (!(Test-Path dist/index.html)) { throw "client/dist/index.html missing" }

      - name: Build backend exe
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel pyinstaller
          python -m pip install -r server/requirements.txt
          pyinstaller --noconfirm --clean --onefile --windowed --icon client/public/favicon.ico --name IvyeaOpsServer --paths server server/ivyeaops_server.py
          if (!(Test-Path dist/IvyeaOpsServer.exe)) { throw "IvyeaOpsServer.exe missing" }

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package Windows x64 bundle
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $stage = "staging/IvyeaOps"
          New-Item -ItemType Directory -Force -Path $stage, "$stage/server", "$stage/client", "$stage/scripts", "$stage/docs" | Out-Null
          Set-Content -Path "$stage/VERSION" -Value $tag -Encoding ascii
          Copy-Item dist/IvyeaOpsServer.exe "$stage/IvyeaOpsServer.exe"
          Copy-Item -Recurse client/dist "$stage/client/dist"
          Copy-Item -Recurse client/public "$stage/client/public"
          Copy-Item -Recurse docs "$stage/docs"
          Copy-Item scripts/stop-hidden.ps1 "$stage/scripts/stop-hidden.ps1"
          Copy-Item scripts/install-components.ps1 "$stage/scripts/install-components.ps1"
          Copy-Item scripts/update-exe.ps1 "$stage/scripts/update-exe.ps1"
          Copy-Item scripts/windows-action-gui.ps1 "$stage/scripts/windows-action-gui.ps1"
          Copy-Item "停止 IvyeaOps.bat" "$stage/停止 IvyeaOps.bat"
          Copy-Item "更新 IvyeaOps Windows x64.bat" "$stage/更新 IvyeaOps Windows x64.bat"
          if (Test-Path README.md) { Copy-Item README.md "$stage/README.md" }
          Compress-Archive -Path staging/IvyeaOps -DestinationPath "IvyeaOps-Windows-x64-$tag.zip" -Force
          Copy-Item "IvyeaOps-Windows-x64-$tag.zip" "IvyeaOps-Windows-x64.zip"
          Get-ChildItem "IvyeaOps-Windows-x64-$tag.zip", "IvyeaOps-Windows-x64.zip" | Format-Table Name,Length

      - name: Upload Windows x64 bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: |
            IvyeaOps-Windows-x64-${{ steps.tag.outputs.tag }}.zip
            IvyeaOps-Windows-x64.zip
